<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NJUPT 评教助手安装</title>
    <style>
        :root {
            --page: #f6f8fa;
            --card: #ffffff;
            --ink: #172033;
            --muted: #66758a;
            --line: #dde5ee;
            --soft: #f8fafc;
            --brand: #205783;
            --brand-dark: #174461;
            --accent: #2e7a61;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
            color: var(--ink);
            background:
                linear-gradient(180deg, #fbfcfd 0%, var(--page) 100%);
        }

        main {
            width: min(760px, calc(100% - 32px));
            margin: 0 auto;
            padding: 56px 0;
        }

        .card {
            border: 1px solid var(--line);
            border-radius: 14px;
            background: var(--card);
            box-shadow: 0 20px 54px rgba(31, 45, 61, 0.08);
        }

        .intro {
            padding: 42px 44px 22px;
        }

        .kicker {
            color: var(--accent);
            font-size: 14px;
            font-weight: 700;
        }

        h1 {
            margin: 14px 0 0;
            font-size: clamp(34px, 7vw, 48px);
            line-height: 1.15;
            letter-spacing: 0;
        }

        p {
            margin: 0;
            line-height: 1.7;
        }

        .lead {
            margin-top: 14px;
            color: var(--muted);
            font-size: 17px;
        }

        .install-box {
            margin: 0 44px 30px;
            padding: 24px;
            border: 1px solid #c8d8e6;
            border-radius: 12px;
            background: var(--soft);
            text-align: center;
        }

        .install-title {
            font-size: 21px;
            font-weight: 800;
        }

        .install-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-top: 18px;
            min-width: 210px;
            min-height: 56px;
            padding: 16px 22px;
            border-radius: 8px;
            color: #ffffff;
            background: var(--brand);
            box-shadow: 0 12px 24px rgba(32, 87, 131, 0.2);
            text-decoration: none;
            font-size: 18px;
            font-weight: 800;
            transition: transform 140ms ease, background 140ms ease, box-shadow 140ms ease;
            user-select: none;
            cursor: grab;
        }

        .install-link:hover {
            background: var(--brand-dark);
            box-shadow: 0 16px 34px rgba(32, 85, 127, 0.28);
            transform: translateY(-1px);
        }

        .install-link:active {
            cursor: grabbing;
        }

        .install-tip {
            max-width: 520px;
            margin: 16px auto 0;
            color: var(--muted);
            font-size: 15px;
        }

        .flow {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            border-top: 1px solid var(--line);
            border-bottom: 1px solid var(--line);
        }

        .flow-item {
            padding: 24px 26px;
            border-right: 1px solid var(--line);
        }

        .flow-item:last-child {
            border-right: 0;
        }

        .number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            margin-bottom: 12px;
            border-radius: 999px;
            color: #ffffff;
            background: var(--accent);
            font-weight: 700;
        }

        .flow-title {
            font-size: 17px;
            font-weight: 800;
        }

        .flow-text {
            margin-top: 8px;
            color: var(--muted);
            font-size: 14px;
        }

        .panel {
            padding: 22px 44px;
            color: var(--muted);
            background: #fbfcfd;
        }

        details {
            padding: 0 44px 34px;
            background: #fbfdff;
        }

        summary {
            cursor: pointer;
            font-weight: 700;
            color: var(--ink);
        }

        details p {
            margin-top: 10px;
            color: var(--muted);
            font-size: 14px;
        }

        textarea {
            width: 100%;
            min-height: 118px;
            margin-top: 14px;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            color: #263244;
            background: #ffffff;
            font-family: Consolas, "Courier New", monospace;
            font-size: 12px;
            line-height: 1.45;
            resize: vertical;
        }

        @media (max-width: 760px) {
            main {
                width: min(100% - 20px, 760px);
                padding: 18px 0;
            }

            .intro {
                padding: 28px 24px 18px;
            }

            .install-box {
                margin: 0 24px 24px;
                padding: 22px 18px;
            }

            .flow {
                grid-template-columns: 1fr;
            }

            .flow-item {
                padding: 20px 24px;
                border-right: 0;
                border-bottom: 1px solid var(--line);
            }

            .flow-item:last-child {
                border-bottom: 0;
            }

            .panel,
            details {
                padding-left: 24px;
                padding-right: 24px;
            }
        }
    </style>
</head>
